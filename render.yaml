services:
  - type: web
    name: portfolio-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        fromValue: ${MONGO_URI}
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        fromValue: ${OPENAI_API_KEY}
      - key: NODE_ENV
        value: production
